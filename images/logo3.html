<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Logo Groupe SPB - Transparent</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;900&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #555;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    font-family: sans-serif;
  }
  .preview-box { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .preview-box span { color: #eee; font-size: 12px; letter-spacing: 1px; }
  .damier {
    background: repeating-conic-gradient(#999 0% 25%, #777 0% 50%) 0 0 / 16px 16px;
    padding: 16px;
    border-radius: 6px;
  }
  #logoWrap {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 56px;
    gap: 8px;
    width: 400px;
    background: transparent;
  }
  .bar { display: flex; align-items: center; width: 100%; }
  .bar-side   { flex: 1; height: 3px; background: #fff; border-radius: 2px; }
  .bar-yellow { width: 90px; height: 3px; background: #F5C518; border-radius: 2px; }
  .groupe {
    font-family: 'Barlow Condensed', Arial, sans-serif;
    font-weight: 400;
    font-size: 32px;
    letter-spacing: 12px;
    color: #fff;
    line-height: 1.3;
    text-indent: 12px;
    white-space: nowrap;
  }
  .spb-row { display: flex; align-items: baseline; line-height: 1; }
  .spb-row span {
    font-family: 'Barlow Condensed', Arial, sans-serif;
    font-weight: 900;
    font-size: 100px;
    line-height: 1;
    display: inline-block;
    color: #fff;
  }
  .spb-row .b { color: #F5C518; }

  .btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  button { border: none; padding: 13px 28px; font-size: 15px; font-weight: 700; cursor: pointer; border-radius: 4px; letter-spacing: 1px; background: #F5C518; color: #111; }
  button:hover { background: #D4A900; }
  p { color: #eee; font-size: 13px; margin: 0; }
</style>
</head>
<body>

<p>Aperçu (damier = fond transparent)</p>

<div class="preview-box">
  <div class="damier">
    <div id="logoWrap">
      <div class="bar"><div class="bar-side"></div><div class="bar-yellow"></div><div class="bar-side"></div></div>
      <div class="groupe">GROUPE</div>
      <div class="spb-row">
        <span>S</span><span>P</span><span class="b">B</span>
      </div>
      <div class="bar"><div class="bar-side"></div><div class="bar-yellow"></div><div class="bar-side"></div></div>
    </div>
  </div>
  <span>TRANSPARENT — lettres blanches + B jaune</span>
</div>

<div class="btns">
  <button onclick="dl()">⬇ Télécharger PNG transparent</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function dl() {
  const el = document.getElementById('logoWrap');
  html2canvas(el, {
    backgroundColor: null,
    scale: 4,
    useCORS: true,
    logging: false
  }).then(canvas => {
    const a = document.createElement('a');
    a.download = 'groupe-spb-logo-transparent.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}
</script>
</body>
</html>
