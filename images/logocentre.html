<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Logo SP Excavation Aménagement</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;900&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #555;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    font-family: sans-serif;
  }
  .previews { display: flex; flex-direction: column; gap: 24px; align-items: center; }
  .preview-box { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .preview-box span { color: #eee; font-size: 12px; letter-spacing: 1px; }

  .logoWrap {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 40px;
    gap: 8px;
  }

  .bar { display: flex; align-items: center; width: 100%; }
  .bar-yellow { width: 100px; height: 3px; background: #F5C518; border-radius: 2px; }

  #logoNoir  { background: #111; }
  #logoBlanc { background: #F8F7F4; }

  #logoNoir  .bar-side { flex: 1; height: 3px; background: #fff; border-radius: 2px; }
  #logoBlanc .bar-side { flex: 1; height: 3px; background: #111; border-radius: 2px; }

  .text-row {
    display: flex;
    align-items: center;
    gap: 20px;
    white-space: nowrap;
  }

  .text-row span {
    font-family: 'Barlow Condensed', Arial, sans-serif;
    font-weight: 900;
    font-size: 52px;
    letter-spacing: 4px;
    line-height: 1;
  }

  #logoNoir  .text-row span { color: #fff; }
  #logoBlanc .text-row span { color: #111; }

  .text-row .yellow { color: #F5C518 !important; }

  .sep {
    width: 3px;
    height: 40px;
    background: #F5C518;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  button { border: none; padding: 13px 28px; font-size: 15px; font-weight: 700; cursor: pointer; border-radius: 4px; letter-spacing: 1px; }
  button.jaune { background: #F5C518; color: #111; }
  button.jaune:hover { background: #D4A900; }
  button.dark { background: #111; color: #fff; border: 1px solid #444; }
  button.dark:hover { background: #222; }
  p { color: #eee; font-size: 13px; margin: 0; }
</style>
</head>
<body>

<p>Aperçu des deux versions</p>

<div class="previews">

  <div class="preview-box">
    <div class="logoWrap" id="logoNoir">
      <div class="bar"><div class="bar-side"></div><div class="bar-yellow"></div><div class="bar-side"></div></div>
      <div class="text-row">
        <span>EXCAVATION</span>
        <div class="sep"></div>
        <span>AMÉNAGEMENT</span>
        <div class="sep"></div>
        <span>S<span class="yellow">P</span></span>
      </div>
      <div class="bar"><div class="bar-side"></div><div class="bar-yellow"></div><div class="bar-side"></div></div>
    </div>
    <span>FOND NOIR</span>
  </div>

  <div class="preview-box">
    <div class="logoWrap" id="logoBlanc">
      <div class="bar"><div class="bar-side"></div><div class="bar-yellow"></div><div class="bar-side"></div></div>
      <div class="text-row">
        <span>EXCAVATION</span>
        <div class="sep"></div>
        <span>AMÉNAGEMENT</span>
        <div class="sep"></div>
        <span>S<span class="yellow">P</span></span>
      </div>
      <div class="bar"><div class="bar-side"></div><div class="bar-yellow"></div><div class="bar-side"></div></div>
    </div>
    <span>FOND BLANC</span>
  </div>

</div>

<div class="btns">
  <button class="dark"  onclick="dl('logoNoir',  '#111111', 'noir')">⬇ PNG fond noir</button>
  <button class="jaune" onclick="dl('logoBlanc', '#F8F7F4', 'blanc')">⬇ PNG fond blanc</button>
  <button class="jaune" onclick="dl('logoNoir',  null,      'transparent')">⬇ PNG transparent</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function dl(id, bg, name) {
  const el = document.getElementById(id);
  html2canvas(el, {
    backgroundColor: bg || null,
    scale: 4,
    useCORS: true,
    logging: false
  }).then(canvas => {
    const a = document.createElement('a');
    a.download = 'sp-excavation-logo-' + name + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}
</script>
</body>
</html>
