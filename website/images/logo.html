<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Logo Groupe SPB</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;900&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #888;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    font-family: sans-serif;
  }
  .preview {
    background: repeating-conic-gradient(#999 0% 25%, #777 0% 50%) 0 0 / 16px 16px;
    padding: 20px;
    border-radius: 6px;
  }
  #logoWrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: transparent;
    padding: 24px 48px;
    gap: 6px;
  }
  .bar {
    display: flex;
    align-items: center;
    width: 100%;
  }
  .bar-black  { flex: 1; height: 4px; background: #111; border-radius: 2px; }
  .bar-yellow { width: 110px; height: 4px; background: #F5C518; border-radius: 2px; }
  .groupe {
    font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
    font-weight: 400;
    font-size: 38px;
    letter-spacing: 14px;
    color: #111;
    line-height: 1.2;
    text-indent: 14px;
  }
  .spb {
    font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
    font-weight: 900;
    font-size: 130px;
    letter-spacing: 6px;
    line-height: 1;
    color: #111;
    text-indent: 6px;
  }
  .spb .b { color: #F5C518; }
  .btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  button {
    background: #F5C518;
    border: none;
    padding: 13px 28px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: 1px;
  }
  button:hover { background: #D4A900; }
  button.dark  { background: #111; color: #fff; }
  button.dark:hover { background: #333; }
  button.blanc { background: #F8F7F4; border: 1px solid #ccc; }
  p { color: #eee; font-size: 13px; margin: 0; }
</style>
</head>
<body>

<p>Aperçu (damier = fond transparent)</p>

<div class="preview">
  <div id="logoWrap">
    <div class="bar"><div class="bar-black"></div><div class="bar-yellow"></div><div class="bar-black"></div></div>
    <div class="groupe">GROUPE</div>
    <div class="spb">SP<span class="b">B</span></div>
    <div class="bar"><div class="bar-black"></div><div class="bar-yellow"></div><div class="bar-black"></div></div>
  </div>
</div>

<div class="btns">
  <button class="blanc" onclick="dl('#F8F7F4','blanc')">⬇ PNG fond blanc</button>
  <button class="dark"  onclick="dl('#111111','noir')">⬇ PNG fond noir</button>
  <button onclick="dl(null,'transparent')">⬇ PNG transparent</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function dl(bg, name) {
  const el = document.getElementById('logoWrap');
  const prev = el.style.background;
  if (bg) el.style.background = bg;
  html2canvas(el, {
    backgroundColor: bg || null,
    scale: 4,
    useCORS: true,
    logging: false
  }).then(canvas => {
    el.style.background = prev;
    const a = document.createElement('a');
    a.download = 'groupe-spb-logo-' + name + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}
</script>
</body>
</html>
