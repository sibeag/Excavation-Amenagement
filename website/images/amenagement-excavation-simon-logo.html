<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Logo Aménagement & Excavation Simon</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;900&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #666;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    font-family: sans-serif;
  }
  .previews { display: flex; flex-direction: column; gap: 20px; align-items: center; }
  .preview-box { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .preview-box span { color: #eee; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
  .damier {
    background: repeating-conic-gradient(#999 0% 25%, #777 0% 50%) 0 0 / 16px 16px;
    padding: 12px;
    border-radius: 4px;
  }

  .logoWrap {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 48px;
    gap: 10px;
    min-width: 600px;
  }

  .bar { display: flex; align-items: center; width: 100%; }
  .bar-yellow { width: 120px; height: 2.5px; background: #F5C518; border-radius: 2px; flex-shrink: 0; }

  /* FOND NOIR — texte blanc */
  #logoNoir  { background: #111; }
  #logoNoir  .bar-side { flex: 1; height: 2.5px; background: #fff; border-radius: 2px; }
  #logoNoir  .ligne1 { font-family: 'Barlow Condensed', Arial, sans-serif; font-weight: 900; font-size: 28px; letter-spacing: 4px; color: #fff; white-space: nowrap; text-align: center; }
  #logoNoir  .ligne2 { font-family: 'Barlow Condensed', Arial, sans-serif; font-weight: 900; font-size: 46px; letter-spacing: 10px; color: #F5C518; white-space: nowrap; text-align: center; text-indent: 10px; }

  /* FOND BLANC — texte noir */
  #logoBlanc { background: #F8F7F4; }
  #logoBlanc .bar-side { flex: 1; height: 2.5px; background: #111; border-radius: 2px; }
  #logoBlanc .ligne1 { font-family: 'Barlow Condensed', Arial, sans-serif; font-weight: 900; font-size: 28px; letter-spacing: 4px; color: #111; white-space: nowrap; text-align: center; }
  #logoBlanc .ligne2 { font-family: 'Barlow Condensed', Arial, sans-serif; font-weight: 900; font-size: 46px; letter-spacing: 10px; color: #F5C518; white-space: nowrap; text-align: center; text-indent: 10px; }

  /* TRANSPARENT — texte blanc */
  #logoTransp { background: transparent; }
  #logoTransp .bar-side { flex: 1; height: 2.5px; background: #fff; border-radius: 2px; }
  #logoTransp .ligne1 { font-family: 'Barlow Condensed', Arial, sans-serif; font-weight: 900; font-size: 28px; letter-spacing: 4px; color: #fff; white-space: nowrap; text-align: center; }
  #logoTransp .ligne2 { font-family: 'Barlow Condensed', Arial, sans-serif; font-weight: 900; font-size: 46px; letter-spacing: 10px; color: #F5C518; white-space: nowrap; text-align: center; text-indent: 10px; }

  .btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  button { border: none; padding: 13px 24px; font-size: 14px; font-weight: 700; cursor: pointer; border-radius: 4px; letter-spacing: 1px; }
  button.jaune { background: #F5C518; color: #111; }
  button.jaune:hover { background: #D4A900; }
  button.dark { background: #111; color: #fff; border: 1px solid #444; }
  button.dark:hover { background: #222; }
  button.blanc { background: #F8F7F4; color: #111; border: 1px solid #ccc; }
  button.blanc:hover { background: #e8e8e8; }
</style>
</head>
<body>

<div class="previews">

  <div class="preview-box">
    <div class="logoWrap" id="logoNoir">
      <div class="bar"><div class="bar-side"></div><div class="bar-yellow"></div><div class="bar-side"></div></div>
      <div class="ligne1">AMÉNAGEMENT &amp; EXCAVATION</div>
      <div class="ligne2">SIMON</div>
      <div class="bar"><div class="bar-side"></div><div class="bar-yellow"></div><div class="bar-side"></div></div>
    </div>
    <span>Fond noir</span>
  </div>

  <div class="preview-box">
    <div class="logoWrap" id="logoBlanc">
      <div class="bar"><div class="bar-side"></div><div class="bar-yellow"></div><div class="bar-side"></div></div>
      <div class="ligne1">AMÉNAGEMENT &amp; EXCAVATION</div>
      <div class="ligne2">SIMON</div>
      <div class="bar"><div class="bar-side"></div><div class="bar-yellow"></div><div class="bar-side"></div></div>
    </div>
    <span>Fond blanc</span>
  </div>

  <div class="preview-box">
    <div class="damier">
      <div class="logoWrap" id="logoTransp">
        <div class="bar"><div class="bar-side"></div><div class="bar-yellow"></div><div class="bar-side"></div></div>
        <div class="ligne1">AMÉNAGEMENT &amp; EXCAVATION</div>
        <div class="ligne2">SIMON</div>
        <div class="bar"><div class="bar-side"></div><div class="bar-yellow"></div><div class="bar-side"></div></div>
      </div>
    </div>
    <span>Transparent (lettres blanches)</span>
  </div>

</div>

<div class="btns">
  <button class="dark"  onclick="dl('logoNoir',  '#111111',  'fond-noir')">⬇ PNG fond noir</button>
  <button class="blanc" onclick="dl('logoBlanc', '#F8F7F4',  'fond-blanc')">⬇ PNG fond blanc</button>
  <button class="jaune" onclick="dl('logoTransp', null,      'transparent')">⬇ PNG transparent</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function dl(id, bg, name) {
  const el = document.getElementById(id);
  const prevBg = el.style.background;
  if (bg) el.style.background = bg;
  html2canvas(el, {
    backgroundColor: bg || null,
    scale: 4,
    useCORS: true,
    logging: false
  }).then(canvas => {
    el.style.background = prevBg;
    const a = document.createElement('a');
    a.download = 'amenagement-excavation-simon-' + name + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}
</script>
</body>
</html>
